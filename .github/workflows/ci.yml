name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-cljs:
    name: shadow-cljs node-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # shadow-cljs.edn's :source-paths reference these siblings by
      # hardcoded relative path (../<repo>/src), not via deps.edn --
      # same pattern app-aozora uses for kotobase-client/atproto/mst.
      - run: git clone --depth 1 https://github.com/kotoba-lang/kotobase-peer.git ../kotobase-peer
      - run: git clone --depth 1 https://github.com/kotoba-lang/datom.git ../datom
      - run: git clone --depth 1 https://github.com/kotoba-lang/arrangement.git ../arrangement
      - run: git clone --depth 1 https://github.com/kotoba-lang/prolly-tree.git ../prolly-tree
      - run: git clone --depth 1 https://github.com/kotoba-lang/chain.git ../chain
      - run: git clone --depth 1 https://github.com/kotoba-lang/io-ipld.git ../io-ipld
      - run: git clone --depth 1 https://github.com/kotoba-lang/io-multiformats.git ../io-multiformats
      - run: git clone --depth 1 https://github.com/kotoba-lang/dag-cbor.git ../dag-cbor
      - run: git clone --depth 1 https://github.com/kotoba-lang/kotobase-client.git ../kotobase-client
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules / gitlibs
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.gitlibs
            ~/.m2
          key: ${{ runner.os }}-cljs-${{ hashFiles('package.json', 'deps.edn') }}

      - run: npm install
      - run: npm test
